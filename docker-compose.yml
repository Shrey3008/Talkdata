# Local dev compose. Database is Supabase (remote) — no local postgres service.
# Airflow and frontend services are added in later phases.
services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
